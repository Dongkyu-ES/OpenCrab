name: ontology-playground
version: 1.0.0
description: Schema pack for the Microsoft Ontology-Playground learn corpus (seeds/ontology-playground).
  Formalises the domain entity models from all 13 tracks/labs — commerce, finance, healthcare, HR, manufacturing,
  university, supply-chain risk, FIBO loans/risk, retail supply chain, and cold-chain logistics — as concept-space
  node types (91 track-level entity models deduplicated to 75 unique types).
source: https://github.com/microsoft/Ontology-Playground (MIT)
spaces:
- concept
types:
- name: Account
  space: concept
  description: Domain entity type from the Ontology-Playground learn corpus (Banking & Finance).
  properties:
    accountNumber:
      type: string
      required: true
      nullable: false
      description: Identifier property.
    type:
      type: string
      required: false
      description: checking / savings / brokerage
    balance:
      type: number
      required: false
      description: USD
    interestRate:
      type: number
      required: false
      description: '%'
    openDate:
      type: string
      required: false
      format: date
- name: AlternativeSupplier
  space: concept
  description: Domain entity type from the Ontology-Playground learn corpus (Supply Chain Disruption &
    Risk Propagation).
  properties:
    altSupplierId:
      type: string
      required: true
      nullable: false
      description: '"ALTSUPP-00789"'
    name:
      type: string
      required: false
    country:
      type: string
      required: false
    qualificationStatus:
      type: string
      required: false
      enum:
      - Pre-qualified
      - Approved
      - Pending Audit
      - Not Qualified
    capacityAvailable:
      type: integer
      required: false
      description: units/month
    pricePremiumPercent:
      type: number
      required: false
      description: '%'
